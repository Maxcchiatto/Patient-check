<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Medical Appointment - System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap');
        :root { --primary-color: #007bff; --bg-color: #f8f9fa; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-color); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .main-container { width: 100%; max-width: 480px; }
        .live-status { background: linear-gradient(135deg, #0056b3, #007bff); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; box-shadow: 0 4px 12px rgba(0,123,255,0.3); }
        .current-num { font-size: 3rem; font-weight: bold; display: block; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        input { width: 100%; padding: 15px; border: 2px solid #e9ecef; border-radius: 12px; font-size: 1.2rem; text-align: center; margin-bottom: 15px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-search { background-color: var(--primary-color); color: white; }
        #appointmentDisplay { display: none; margin-top: 25px; }
        .ticket { background: white; border: 2px solid #eee; border-radius: 15px; padding: 20px; text-align: left; }
        .ticket-header { text-align: center; border-bottom: 2px dashed #eee; padding-bottom: 15px; margin-bottom: 15px; }
        .queue-badge { background: #e7f3ff; color: #007bff; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 15px; }
        .queue-badge b { font-size: 2rem; display: block; }
        .info-group { margin-bottom: 10px; }
        .info-group label { font-size: 0.85rem; color: #888; display: block; }
        .info-group span { font-weight: bold; color: #222; }
        .prep-box { background: #fff8e1; border-left: 4px solid #ffc107; padding: 12px; margin-top: 15px; border-radius: 5px; font-size: 0.9rem; }
        .btn-save { background-color: #28a745; color: white; margin-top: 15px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="live-status">
        <span>📢 ขณะนี้กำลังเรียกคิวลำดับที่</span>
        <strong id="liveQueueNow" class="current-num">-</strong>
    </div>

    <div class="card">
        <h2>🏥 ตรวจสอบนัดหมาย</h2>
        <input type="text" id="hnInput" placeholder="กรอกเลข HN (เช่น 68023734)">
        <button class="btn btn-search" onclick="searchHN()">ค้นหาข้อมูล</button>
        
        <div id="appointmentDisplay">
            <div id="captureArea" class="ticket">
                <div class="ticket-header"><strong>บัตรนัดรับการตรวจ</strong></div>
                <div class="queue-badge">คิวตรวจของคุณลำดับที่ <b id="resQueue">-</b></div>
                <div class="info-group"><label>เลข HN</label><span id="resHN">-</span></div>
                <div class="info-group"><label>ชื่อ-นามสกุล</label><span id="resName">-</span></div>
                <div class="info-group" style="display: flex; justify-content: space-between;">
                    <div><label>เวลานัด</label><span id="resTime">-</span></div>
                    <div><label>วันที่</label><span id="resDate">-</span></div>
                </div>
                <div class="info-group"><label>แพทย์ผู้ตรวจ</label><span id="resDoctor">-</span></div>
                <div class="info-group"><label>รายการตรวจ / สถานที่</label><span id="resDetail" style="color: #007bff;">-</span></div>
                <div id="prepArea" class="prep-box" style="display:none;">
                    <strong>⚠️ การเตรียมตัว:</strong> <div id="resPrep"></div>
                </div>
            </div>
            <button class="btn btn-save" onclick="saveCapture()">📸 บันทึกเป็นรูปภาพลงเครื่อง</button>
        </div>
    </div>
</div>

<script>
    const SHEET_ID = '1-HCY_NHGAVifnw9n_cozsxuupiwUizNcecsD8sxcIig';
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    async function updateLiveQueue() {
        try {
            const res = await fetch(URL);
            const text = await res.text();
            const data = JSON.parse(text.substr(47).slice(0, -2));
            const currentQ = data.table.rows[0].c[7] ? data.table.rows[0].c[7].v : "-";
            document.getElementById('liveQueueNow').innerText = currentQ;
        } catch (e) { console.error(e); }
    }

    async function searchHN() {
        const hn = document.getElementById('hnInput').value.trim();
        const display = document.getElementById('appointmentDisplay');
        if (!hn) return;

        try {
            const res = await fetch(URL);
            const text = await res.text();
            const data = JSON.parse(text.substr(47).slice(0, -2));
            const rows = data.table.rows;
            let row = rows.find(r => r.c[0] && String(r.c[0].v).includes(hn));

            if (row) {
                display.style.display = "block";
                document.getElementById('resHN').innerText = row.c[0].v;
                document.getElementById('resName').innerText = row.c[1] ? row.c[1].v : '-';
                document.getElementById('resDate').innerText = row.c[2] ? row.c[2].v : '-';
                document.getElementById('resTime').innerText = row.c[3] ? (row.c[3].f || row.c[3].v) : '-';
                document.getElementById('resDetail').innerText = row.c[4] ? row.c[4].v : '-';
                document.getElementById('resDoctor').innerText = row.c[5] ? row.c[5].v : '-'; // Col F
                document.getElementById('resQueue').innerText = row.c[8] ? row.c[8].v : '-'; // Col I

                const prep = row.c[6] ? row.c[6].v : "";
                if (prep) {
                    document.getElementById('prepArea').style.display = "block";
                    document.getElementById('resPrep').innerText = prep;
                } else {
                    document.getElementById('prepArea').style.display = "none";
                }
            } else { alert("ไม่พบเลข HN"); }
        } catch (e) { alert("Error"); }
    }

    function saveCapture() {
        html2canvas(document.getElementById('captureArea'), { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `ใบนัด-${document.getElementById('resHN').innerText}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    updateLiveQueue();
    setInterval(updateLiveQueue, 30000);
</script>
</body>
</html>
