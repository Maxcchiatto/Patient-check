<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Appointment System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap');
        :root { --primary: #0056b3; --accent: #e3f2fd; --text: #333; }
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; padding: 15px; }
        .main-container { width: 100%; max-width: 500px; }
        .live-status { background: linear-gradient(135deg, #004494, #007bff); color: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: center; }
        .current-num { font-size: 2.5rem; font-weight: bold; display: block; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 1.2rem; text-align: center; margin-bottom: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-search { background-color: var(--primary); color: white; }
        #appointmentDisplay { display: none; margin-top: 20px; }
        .ticket { background: white; border: 1px solid #ddd; border-radius: 10px; padding: 15px; text-align: left; }
        .ticket-header { text-align: center; border-bottom: 2px dashed #eee; padding-bottom: 10px; margin-bottom: 15px; font-weight: bold; }
        .queue-badge { background: var(--accent); color: var(--primary); padding: 8px; border-radius: 10px; text-align: center; margin-bottom: 15px; }
        .queue-badge b { font-size: 1.8rem; display: block; }
        
        /* ปรับ Grid ใหม่ให้แสดงผลครบ */
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .info-group { margin-bottom: 8px; border-bottom: 1px solid #f0f0f0; padding-bottom: 4px; }
        .info-group label { font-size: 0.7rem; color: #888; display: block; }
        .info-group span { font-weight: 700; color: var(--text); font-size: 0.85rem; }
        .full-width { grid-column: span 2; }

        .prep-box { background: #fff9e6; border-left: 4px solid #ffc107; padding: 10px; margin-top: 10px; border-radius: 5px; font-size: 0.85rem; }
        .note-box { background: #fdf2f2; border-left: 4px solid #dc3545; padding: 10px; margin-top: 10px; border-radius: 5px; font-size: 0.85rem; color: #b02a37; }
        .btn-save { background-color: #28a745; color: white; margin-top: 15px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="live-status">
        <span>📢 เรียกคิวลำดับที่</span>
        <strong id="liveQueueNow" class="current-num">-</strong>
    </div>

    <div class="card">
        <h2>🏥 ตรวจสอบนัดหมาย</h2>
        <input type="text" id="hnInput" placeholder="กรอกเลข HN">
        <button class="btn btn-search" onclick="searchHN()">ค้นหาข้อมูล</button>
        
        <div id="appointmentDisplay">
            <div id="captureArea" class="ticket">
                <div class="ticket-header">ใบนัดตรวจแผนกเอกซเรย์</div>
                <div class="queue-badge">ลำดับคิวของคุณ <b id="resQueue">-</b></div>

                <div class="grid-info">
                    <div class="info-group"><label>เลข HN</label><span id="resHN">-</span></div>
                    <div class="info-group"><label>สิทธิการรักษา</label><span id="resSitti">-</span></div>
                    
                    <div class="info-group full-width"><label>ชื่อ-นามสกุล</label><span id="resName">-</span></div>
                    
                    <div class="info-group"><label>วันที่นัด</label><span id="resDate">-</span></div>
                    <div class="info-group"><label>เวลานัด</label><span id="resTime">-</span></div>
                    
                    <div class="info-group"><label>คลินิก</label><span id="resClinic">-</span></div>
                    <div class="info-group"><label>แพทย์ผู้ตรวจ</label><span id="resDoctor">-</span></div>
                    
                    <div class="info-group"><label>ผู้เขียนใบนัด</label><span id="resWriter">-</span></div>
                    <div class="info-group"><label>รายการตรวจ</label><span id="resDetail">-</span></div>
                </div>

                <div id="prepArea" class="prep-box" style="display:none;">
                    <strong>⚠️ การเตรียมตัว:</strong> <div id="resPrep"></div>
                </div>

                <div id="noteArea" class="note-box" style="display:none;">
                    <strong>📌 หมายเหตุ:</strong> <div id="resNote"></div>
                </div>
            </div>
            <button class="btn btn-save" onclick="saveCapture()">📸 บันทึกใบนัดลงเครื่อง</button>
        </div>
    </div>
</div>

<script>
    const SHEET_ID = '1-HCY_NHGAVifnw9n_cozsxuupiwUizNcecsD8sxcIig';
    // บังคับดึงข้อมูลคอลัมน์ A ถึง N (0-13)
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&range=A:N`;

    async function updateLiveQueue() {
        try {
            const res = await fetch(URL);
            const text = await res.text();
            const data = JSON.parse(text.substr(47).slice(0, -2));
            const currentQ = data.table.rows[0].c[7] ? (data.table.rows[0].c[7].f || data.table.rows[0].c[7].v) : "-";
            document.getElementById('liveQueueNow').innerText = currentQ;
        } catch (e) { console.error(e); }
    }

    async function searchHN() {
        const hn = document.getElementById('hnInput').value.trim();
        const display = document.getElementById('appointmentDisplay');
        if (!hn) return;

        try {
            const res = await fetch(URL);
            const text = await res.text();
            const data = JSON.parse(text.substr(47).slice(0, -2));
            const rows = data.table.rows;
            let row = rows.find(r => r.c[0] && String(r.c[0].v).includes(hn));

            if (row) {
                display.style.display = "block";
                const getVal = (idx) => {
                    if (!row.c[idx]) return '-';
                    return row.c[idx].f || row.c[idx].v || '-';
                };

                // แสดงผลทุกฟิลด์ตามลำดับที่คุณขอ
                document.getElementById('resHN').innerText = getVal(0);      // A
                document.getElementById('resName').innerText = getVal(1);    // B
                document.getElementById('resDate').innerText = getVal(2);    // C
                document.getElementById('resTime').innerText = getVal(3);    // D
                document.getElementById('resDetail').innerText = getVal(4);  // E
                document.getElementById('resDoctor').innerText = getVal(5);  // F
                document.getElementById('resQueue').innerText = getVal(8);   // I
                
                document.getElementById('resSitti').innerText = getVal(9);   // J
                document.getElementById('resClinic').innerText = getVal(10); // K
                document.getElementById('resWriter').innerText = getVal(11); // L
                
                // การเตรียมตัว (G)
                const prep = getVal(6);
                document.getElementById('prepArea').style.display = prep !== '-' ? "block" : "none";
                document.getElementById('resPrep').innerText = prep;

                // หมายเหตุ (M)
                const note = getVal(12);
                document.getElementById('noteArea').style.display = note !== '-' ? "block" : "none";
                document.getElementById('resNote').innerText = note;

            } else { alert("ไม่พบข้อมูลหมายเลข HN นี้"); }
        } catch (e) { alert("เกิดข้อผิดพลาดในการโหลดข้อมูล"); }
    }

    function saveCapture() {
        html2canvas(document.getElementById('captureArea'), { scale: 3 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Appoint_HN_${document.getElementById('resHN').innerText}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    updateLiveQueue();
    setInterval(updateLiveQueue, 30000);
</script>
</body>
</html>
