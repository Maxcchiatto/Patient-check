<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบนัดหมายด้วยเลข HN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h2 { color: #0056b3; margin-bottom: 20px; border-bottom: 2px solid #0056b3; padding-bottom: 10px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 1.2rem; text-align: center; font-weight: bold; }
        button { width: 100%; padding: 15px; background: #0056b3; color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; transition: 0.3s; }
        button:hover { background: #003d7a; }
        
        /* สไตล์หน้าตาใบนัด */
        #appointmentCard { display: none; margin-top: 25px; padding: 20px; border: 2px dashed #0056b3; border-radius: 10px; text-align: left; background: #fafafa; position: relative; }
        .card-header { font-weight: bold; color: #d32f2f; margin-bottom: 10px; text-align: center; border-bottom: 1px solid #ddd; }
        .info-row { margin: 8px 0; font-size: 1rem; }
        .label { font-weight: bold; color: #555; display: inline-block; width: 100px; }
        .highlight { color: #000; font-weight: bold; }
        .notfound { color: red; margin-top: 20px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏥 ตรวจสอบนัดหมาย (HN)</h2>
    <p>กรุณากรอกหมายเลข HN 8 หลัก ของท่าน</p>
    <input type="text" id="hnInput" placeholder="เช่น 68023734" maxlength="15">
    <button onclick="searchHN()">🔍 ค้นหาข้อมูลนัดหมาย</button>

    <div id="appointmentCard">
        <div class="card-header">บัตรนัดตรวจออนไลน์</div>
        <div class="info-row"><span class="label">เลข HN:</span> <span id="resHN" class="highlight"></span></div>
        <div class="info-row"><span class="label">ชื่อคนไข้:</span> <span id="resName" class="highlight"></span></div>
        <div class="info-row"><span class="label">วันที่นัด:</span> <span id="resDate" class="highlight"></span></div>
        <div class="info-row"><span class="label">เวลานัด:</span> <span id="resTime" class="highlight"></span></div>
        <div class="info-row"><span class="label">แพทย์:</span> <span id="resDoctor" class="highlight"></span></div>
        <div class="info-row" style="margin-top:10px; padding:10px; background:#e3f2fd; border-radius:5px;">
            <span class="label">รายการ:</span> <br>
            <span id="resDetail" class="highlight" style="font-size:1.1rem; color:#0056b3;"></span>
        </div>
        <p style="font-size: 0.8rem; color: #888; text-align: center; margin-top: 15px;">*กรุณาแสดงหน้าจอนี้ต่อเจ้าหน้าที่เมื่อมาถึง</p>
    </div>

    <div id="errorMsg" class="notfound">❌ ไม่พบข้อมูลเลข HN นี้ในระบบ</div>
</div>

<script>
    const SHEET_ID = '1-HCY_NHGAVifnw9n_cozsxuupiwUizNcecsD8sxcIig'; // ID ของคุณ
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    async function searchHN() {
        const hnInput = document.getElementById('hnInput').value.trim();
        const card = document.getElementById('appointmentCard');
        const errorMsg = document.getElementById('errorMsg');

        if (!hnInput) return alert("กรุณากรอกเลข HN ครับ");

        try {
            const response = await fetch(URL);
            const text = await response.text();
            const data = JSON.parse(text.substr(47).slice(0, -2));
            const rows = data.table.rows;

            // ค้นหาใน Col A (เลข HN)
            let found = rows.find(r => r.c[0] && String(r.c[0].v).includes(hnInput));

            if (found) {
                errorMsg.style.display = "none";
                card.style.display = "block";
                
                // นำข้อมูลลงช่องต่างๆ (เช็คตำแหน่งคอลัมน์ให้ตรงกับที่เตรียมไว้)
                document.getElementById('resHN').innerText = found.c[0].v;
                document.getElementById('resName').innerText = found.c[1] ? found.c[1].v : '-';
                document.getElementById('resDate').innerText = found.c[2] ? found.c[2].v : '-';
                document.getElementById('resTime').innerText = found.c[3] ? (found.c[3].f || found.c[3].v) : '-';
                document.getElementById('resDetail').innerText = found.c[4] ? found.c[4].v : '-';
                document.getElementById('resDoctor').innerText = found.c[5] ? found.c[5].v : '-';
            } else {
                card.style.display = "none";
                errorMsg.style.display = "block";
            }
        } catch (e) {
            alert("เกิดข้อผิดพลาดในการโหลดข้อมูล");
            console.error(e);
        }
    }
</script>

</body>
</html>
